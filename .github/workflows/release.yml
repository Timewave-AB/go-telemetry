name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-tags: true
          fetch-depth: 0

      - name: Compute next tag
        id: bump
        run: |
          set -euo pipefail
          latest=$(git tag --list 'v*' | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)
          latest=${latest:-v0.0.0}
          echo "Latest tag: $latest"

          IFS='.' read -r major minor patch <<< "${latest#v}"
          case "${{ inputs.bump }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "Next tag: $new_tag"
          echo "new_tag=$new_tag" >> "$GITHUB_OUTPUT"
          echo "major=$major" >> "$GITHUB_OUTPUT"

      # v2+ modules need a /vN suffix in the go.mod module path.
      # See https://go.dev/ref/mod#major-version-suffixes
      - name: Guard v2+ module path
        run: |
          set -euo pipefail
          major=${{ steps.bump.outputs.major }}
          module=$(awk '/^module / {print $2; exit}' go.mod)
          if [ "$major" -ge 2 ] && [[ "$module" != */v$major ]]; then
            echo "::error::Bumping to v${major}.x requires go.mod module path ending with /v${major} (current: $module)"
            exit 1
          fi

      - name: Create and push tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "$NEW_TAG"
          git push origin "$NEW_TAG"

      # `go list -m` handles the proxy.golang.org case-escaping (e.g. Timewave-AB → !timewave-!a!b)
      # and validates the module is fetchable in one step.
      - name: Warm Go module proxy
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          set -euo pipefail
          module=$(awk '/^module / {print $2; exit}' go.mod)
          GOPROXY=https://proxy.golang.org GOFLAGS=-mod=mod go list -m "${module}@${NEW_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: gh release create "$NEW_TAG" --generate-notes --title "$NEW_TAG"
